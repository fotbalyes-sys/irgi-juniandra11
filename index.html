<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Kedai Kopi Senja</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=1200') center/cover;
}

.container{
    width:350px;
    background:rgba(0,0,0,0.75);
    padding:30px;
    border-radius:15px;
    color:white;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
}

.password-box{
    position:relative;
    margin:8px 0;
}

.password-box input{
    padding-right:45px;
}

.eye{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
    user-select:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#8B4513;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#A0522D;
}

.link{
    text-align:center;
    margin-top:15px;
}

.link a{
    color:#ffc107;
    cursor:pointer;
    text-decoration:none;
}
</style>
</head>
<body>

<div class="container">

    <!-- LOGIN -->
    <div id="loginForm">

        <h2>☕ Login Kedai Kopi</h2>

        <input type="text" id="loginUser" placeholder="Username">

        <div class="password-box">
            <input type="password" id="loginPass" placeholder="Password">
            <span class="eye" onclick="toggleLoginPassword()">👁️</span>
        </div>

        <button onclick="login()">Login</button>

        <div class="link">
            Belum punya akun?
            <a onclick="showRegister()">Registrasi</a>
        </div>

    </div>

    <!-- REGISTER -->
    <div id="registerForm" style="display:none;">

        <h2>📝 Registrasi</h2>

        <input type="text" id="regUser" placeholder="Username">

        <div class="password-box">
            <input type="password" id="regPass" placeholder="Password">
            <span class="eye" onclick="toggleRegisterPassword()">👁️</span>
        </div>

        <button onclick="register()">Daftar</button>

        <div class="link">
            Sudah punya akun?
            <a onclick="showLogin()">Login</a>
        </div>

    </div>

</div>

<script>

function showRegister(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("registerForm").style.display = "block";
}

function showLogin(){
    document.getElementById("registerForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

function toggleLoginPassword(){

    let pass = document.getElementById("loginPass");

    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }

}

function toggleRegisterPassword(){

    let pass = document.getElementById("regPass");

    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }

}

function register(){

    let user = document.getElementById("regUser").value.trim();
    let pass = document.getElementById("regPass").value.trim();

    if(user === "" || pass === ""){
        alert("Isi username dan password!");
        return;
    }

    localStorage.setItem("username", user);
    localStorage.setItem("password", pass);

    alert("Registrasi berhasil!");
    showLogin();
}

function login(){

    let user = document.getElementById("loginUser").value.trim();
    let pass = document.getElementById("loginPass").value.trim();

    let simpanUser = localStorage.getItem("username");
    let simpanPass = localStorage.getItem("password");

    if(user === simpanUser && pass === simpanPass){

        alert("Login berhasil!");
        window.location.href = "dashboard.html";

    }else{

        alert("Username atau Password salah!");
    }

}

</script>

</body>
</html>
