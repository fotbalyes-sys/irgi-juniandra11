<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout Kedai Kopi Senja</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4e342e,#6f4e37,#8d6e63);
    margin:0;
    padding:20px;
    min-height:100vh;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fffdf9;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:#6f4e37;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

.logo-bayar{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin:20px 0;
}

.metode{
    border:2px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
    cursor:pointer;
    background:white;
}

.metode.active{
    border:3px solid green;
}

.metode img{
    width:70px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.checkout{
    background:#6f4e37;
}

.batal{
    background:red;
    margin-top:10px;
}

#totalPesanan{
    text-align:center;
    color:#4e342e;
    font-size:30px;
}
</style>
</head>
<body>

<div class="container">

<h2>☕ Checkout Kedai Kopi Senja</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">

<input type="text" id="hp" placeholder="Nomor WhatsApp">

<textarea id="alamat" rows="4" placeholder="Alamat Lengkap"></textarea>

<h3>Pilih Metode Pembayaran</h3>

<div class="logo-bayar">

<div class="metode" onclick="pilihBayar('DANA',this)">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg">
<p><b>DANA</b></p>
</div>

<div class="metode" onclick="pilihBayar('QRIS',this)">
<div style="font-size:50px">🔳</div>
<p><b>QRIS</b></p>
</div>

<div class="metode" onclick="pilihBayar('Transfer Bank',this)">
<div style="font-size:50px">🏦</div>
<p><b>Transfer Bank</b></p>
</div>

<div class="metode" onclick="pilihBayar('COD',this)">
<div style="font-size:50px">🚚</div>
<p><b>COD</b></p>
</div>

</div>

<input type="hidden" id="metodeBayar">

<h3 id="totalPesanan">Total : Rp 0</h3>

<button class="checkout" onclick="checkout()">
Checkout Sekarang
</button>

<button class="batal" onclick="window.location.href='dashboard.html'">
Batal
</button>

</div>

<script>

// Ambil total dari localStorage
window.onload = function(){

    let keranjang =
        JSON.parse(localStorage.getItem("keranjang")) || [];

    let total = 0;

    keranjang.forEach(function(item){

        total += Number(item.harga) * Number(item.qty);

    });

    document.getElementById("totalPesanan").innerHTML =
        "Total : Rp " + total.toLocaleString("id-ID");

}

function pilihBayar(metode, el){

    document.getElementById("metodeBayar").value = metode;

    document.querySelectorAll(".metode").forEach(function(item){
        item.classList.remove("active");
    });

    el.classList.add("active");
}

function checkout(){

    let nama = document.getElementById("nama").value;
    let hp = document.getElementById("hp").value;
    let alamat = document.getElementById("alamat").value;
    let metode = document.getElementById("metodeBayar").value;

    if(!nama || !hp || !alamat || !metode){
        alert("Lengkapi semua data terlebih dahulu!");
        return;
    }

    let pesan =
    "☕ PESANAN KEDAI KOPI SENJA\n\n" +
    "Nama : " + nama + "\n" +
    "WhatsApp : " + hp + "\n" +
    "Alamat : " + alamat + "\n" +
    "Metode : " + metode + "\n" +
    document.getElementById("totalPesanan").innerText;

    let url =
    "https://wa.me/6282268866764?text=" +
    encodeURIComponent(pesan);

    window.open(url, "_blank");
}
</script>

</body>
</html>
